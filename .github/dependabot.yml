version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    groups:
      compatible-updates:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /services/api
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    groups:
      compatible-updates:
        update-types:
          - minor
          - patch

